# Pol-Intel UK Sources Configuration
# scraper: "dedicated" = Tier 1 hand-written scraper
#          "generic"   = Tier 2 Claude API extraction

sources:

  # ── Tier 1: Dedicated scrapers ─────────────────────────────────────────────

  - name: "Civil Service Jobs"
    url: "https://www.civilservicejobs.service.gov.uk/csr/jobs.cgi"
    category: "government"
    country: "uk"
    scraper: "dedicated"
    module: "civil_service_jobs"
    enrich_description: false  # Individual job pages are ALTCHA-protected — enrichment always fails
    enabled: true

  - name: "myjobscotland"
    url: "https://www.myjobscotland.gov.uk"
    category: "government"
    country: "uk"
    scraper: "dedicated"
