# Pol-Intel Internship & Graduate Pipeline Sources
#
# Purpose: early-career roles (internships, traineeships, graduate schemes,
# fellowships, placements, apprenticeships) in politics, policy, public affairs,
# lobbying, diplomacy and adjacent sectors — UK, EU, US (UK/EU priority).
#
# Gate: ALL sources are disabled until ATS extractor Part 1 is verified.
# Convention mirrors EU national expansion (enabled: false + notes).
#
# ingestion_pipeline: 'internship_graduate' on every source — documentation only.
# Not read by the Python pipeline (Job model has no such field). Provenance at
# the Supabase level is carried via the `source` column (= source_label in the
# rss_sources table). See data/seeds/internship_graduate_rss_sources.sql.
#
# Compliance posture: green/amber/red per existing 173-source framework.
# Red = excluded outright. Amber = disabled, flagged for manual review.
# Green = enabled once gating condition is met.
#
# Staged rollout: Class A boards first, then Class B ATS-backed, then Class C.
# Signal: sources with require_internship_signal: true apply the positive
# early-career keyword filter (src/filters/internship_signal.py) after scraping
# to keep only internship/graduate-relevant postings. Curated dedicated boards
# (curated: true) are exempt — their output is already early-career by design.
#
# De-duplication: all EXISTING sources removed. Manifest at
# data/seeds/internship_graduate_dedupe.md.

sources:

  # ════════════════════════════════════════════════════════════════════════════
  # CLASS A — Dedicated boards (custom parser, curated, CURATED_SOURCES exempt)
  # These boards are internship/early-career focused by design. All output is
  # passed through without positive-signal screening.
  # ════════════════════════════════════════════════════════════════════════════

  - name: "PubAffairs Networking Jobs"
    url: "https://www.publicaffairsnetworking.com/public-affairs-jobs.php"
    country: uk
    category: public-affairs
    scraper: selector
    selectors:
      job_card: "div.job-snippet"
      title: "div.job-titles h2"
      link: "a[href*='/vacancy/']"
      location: "div.job-titles h3"
    org_static: "PubAffairs Networking"
    enrich_description: true
    curated: true
    ingestion_pipeline: internship_graduate
    compliance_posture: green
    enabled: false  # GATED: disabled until ATS extractor Part 1 verified. Selector verified 2026-06-17: div.job-snippet > div.job-titles h2, 9 live jobs confirmed.
    notes: "PHP static listing page. Selector confirmed 2026-06-17: div.job-snippet > a > div.job-titles h2. Includes GraduateForward and public affairs graduate roles. 9 live jobs on dry-run. Class A dedicated board — curated, exempt from positive signal screening."

