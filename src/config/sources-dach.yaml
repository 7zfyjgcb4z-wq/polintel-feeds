# Pol-Intel EU National Sources — DACH (Germany, Austria)
# scraper: ats_auto = runtime ATS detection (Greenhouse/Lever/Workday/etc.) with AI fallback
# All sources start disabled. Enable in stages per pipeline.py staged-rollout plan.
# country_code: ISO 3166-1 alpha-2; used by downstream ingestion parser for geo-tagging.
# country: injected at pipeline load time as "dach" — do not set here.

sources:

  # ── Germany: dedicated political boards (Stage 1 — KEEP) ──────────────────

  - name: "Parlamentjobs.de"
    url: "https://parlamentjobs.de/"
    country_code: DE
    category: national-politics
    scraper: ats_auto
    language: de
    enabled: true
    notes: "KEEP. ~100% political. WP Job Manager; probe /feed/ and /jobs/feed/ for native RSS. Aggregates party/fraction roles - reduces need to scrape party HQs."

  - name: "Politjobs.com DE"
    url: "https://politjobs.com/en/de/jobs"
    country_code: DE
    category: public-affairs
    scraper: ats_auto
    language: de
    enabled: true
    notes: "KEEP. DACH+Brussels public affairs/political comms. Next.js SSR aggregator - jobs render server-side. ats_auto detect_ats() returns 'personio' (false-positive from linked Personio jobs on page) but Politjobs is not itself a Personio board. Path: AI fallback. Also covers /en/eu/jobs and /en/at/jobs."

  - name: "Politik-Kommunikation Jobs"
    url: "https://jobs.politik-kommunikation.de/stellen-beruf/bundestag-ministerien-verwaltung"
    country_code: DE
    category: public-affairs
    scraper: ats_auto
    language: de
    enabled: true
    notes: "KEEP. Public-affairs/political-communication board. URL is the resolved redirect (stellen-beruf/parlament-regierung 307s here). AI fallback — no ATS detected."

