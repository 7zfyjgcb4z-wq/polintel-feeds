# Category mapping rules
# Used to assign a category slug to a job when the scraper doesn't set one explicitly.

categories:
  government:
    label: "Government"
    feed: "uk-government"
    keywords:
      - civil service
      - government
      - parliament
      - minister
      - whitehall
      - public sector
      - policy advisor
      - parliamentary

  think-tanks:
    label: "Think Tanks"
    feed: "uk-think-tanks"
    keywords:
      - think tank
      - research fellow
      - policy analyst
      - policy researcher
      - senior researcher

  political-parties:
    label: "Political Parties"
    feed: "uk-political-parties"
    keywords:
      - political party
      - party staff
      - campaigns

  public-affairs:
    label: "Public Affairs"
    feed: "uk-public-affairs"
    keywords:
      - public affairs
      - government relations
      - lobbying
      - stakeholder
      - communications
      - advocacy

  ngos:
    label: "NGOs"
    feed: "uk-ngos"
    keywords:
      - charity
      - ngo
      - non-governmental
      - third sector
      - voluntary
      - not-for-profit

  fellowships:
    label: "Fellowships"
    feed: "uk-fellowships"
    keywords:
      - fellowship
      - intern
      - graduate scheme
      - placement
      - fast stream

  trade-associations:
    label: "Trade Associations"
    feed: "uk-trade-associations"
    keywords:
      - trade association
      - industry body
      - trade union
      - employers' federation

  general:
    label: "General"
    feed: "uk-general"
    keywords: []

  # ── Brussels/EU categories ──────────────────────────────────────────────────

  eu-institutions:
    label: "EU Institutions"
    feed: "brussels-eu-institutions"
    keywords:
      - european commission
      - european parliament
      - council of the eu
      - eu institution
      - epso
      - eu agency

  eu-affairs:
    label: "EU Affairs"
    feed: "brussels-eu-affairs"
    keywords:
      - eu affairs
      - european affairs
      - brussels
      - eu policy
      - european policy
      - trade association brussels

  international-orgs:
    label: "International Organisations"
    feed: "brussels-international-orgs"
    keywords:
      - nato
      - oecd
      - international organisation
      - intergovernmental

  # ── US categories ────────────────────────────────────────────────────────────

  us-federal:
    label: "US Federal Government"
    feed: "us-us-federal"
    keywords:
      - federal agency
      - usajobs
      - executive branch
      - department of state
      - department of defense

  us-congress:
    label: "US Congress"
    feed: "us-us-congress"
    keywords:
      - congress
      - senate
      - house of representatives
      - committee staff
      - capitol hill
      - member office

  us-think-tanks:
    label: "US Think Tanks"
    feed: "us-us-think-tanks"
    keywords:
      - think tank
      - policy research
      - brookings
      - heritage foundation
      - american enterprise institute
      - council on foreign relations

  us-government-affairs:
    label: "US Government Affairs"
    feed: "us-us-government-affairs"
    keywords:
      - lobbying
      - government affairs
      - government relations
      - public affairs
      - advocacy firm

  us-ngos:
    label: "US NGOs & Advocacy"
    feed: "us-us-ngos"
    keywords:
      - nonprofit
      - non-profit
      - advocacy
      - civil society
      - ngo

  us-fellowships:
    label: "US Fellowships"
    feed: "us-us-fellowships"
    keywords:
      - fellowship
      - policy fellowship
      - presidential management
      - congressional fellowship

  us-campaigns:
    label: "US Campaigns & Parties"
    feed: "us-us-campaigns"
    keywords:
      - political campaign
      - political party
      - democratic party
      - republican party
      - campaign staff
