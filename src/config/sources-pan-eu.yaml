# Pol-Intel EU National Sources — Pan-European Backbone
# These sources are not country-specific; country_code is null.
# The runtime location parser assigns geo-tags per job from description/title.
# Highest ROI sources: enable Stage 1 first.
#
# NOTE: EuroBrussels already exists in sources-brussels.yaml as a dedicated scraper
# (enabled: true). Do NOT duplicate it here.

sources:

  # ── Pan-EU job boards (Stage 1 — KEEP) ───────────────────────────────────

  - name: "EURACTIV JobSite"
    url: "https://jobs.euractiv.com/"
    country_code: null
    category: eu-affairs
    scraper: ats_auto
    language: en
    enabled: false
    notes: "KEEP. ~100% relevant. DEFERRED: WP Job Manager site, no valid jobs RSS or API. /rss/ and /feed/ return career-advice articles only (same issue as disabled 'EurActiv Jobs' entry in sources-brussels.yaml). Needs a selector scraper once DOM structure is confirmed, or AI on rendered HTML. Do not duplicate the sources-brussels.yaml entry."

  - name: "EUJobs.co"
    url: "https://www.eujobs.co/"
    country_code: null
    category: eu-affairs
    scraper: ats_auto
    render_js: true
    language: en
    enabled: false
    notes: "KEEP. ~100% relevant. DEFERRED to Playwright tier — JS-rendered React app with no SSR job content. Selector extraction once rendered."

  # ── Development/international (CONDITIONAL — Stage 3) ────────────────────

  - name: "UN Job Feed"
    url: "https://careers.un.org/jobfeed"
    country_code: null
    category: international-orgs
    scraper: rss_feed
    field_map:
      title: title
      description: description
    org_from_description_regex: "Department/Office\\s*:\\s*([^\\n]+?)(?:\\s+Duty Station|\\s*$)"
    enrich_description: false  # RSS is a metadata-header stub only (Level/Job ID/Duty Station/dates). The full body is on the JS-rendered Inspira detail page and is deliberately not fetched; the stub is accepted for discovery. Restored 2026-07-13; org/location/closing are recovered downstream by fetch-rss's UN parser.
    enabled: true

  - name: "Devex"
    url: "https://www.devex.com/jobs/search"
    country_code: null
    category: international-orgs
    scraper: ats_auto
    language: en
    enabled: false
    notes: "AI-only extraction — deactivated under zero-API policy; revisit via per-site selector or deliberate AI re-enable. COND. Global development; ~70% relevant after filtering for EU/policy. JS-rendered - may need Playwright or partner feed. Enable only after relevance filter confirmed."

  - name: "Open Society Foundations Careers"
    url: "https://osfglobal.wd5.myworkdayjobs.com/OSF"
    country_code: null
    category: international-orgs
    scraper: ats_auto
    platform: workday
    identifier:
      tenant: osfglobal
      dc: wd5
      site: OSF
    org_static: "Open Society Foundations"
    enabled: false  # Pending owner ToS decision before enabling. Categorisation compromise: straddles international-orgs and ngos; international-orgs chosen for pan-eu pipeline fit.
    notes: "Workday wd5. Identifier confirmed 2026-07-22. Categorised as international-orgs (compromise: straddles international-orgs and ngos; international-orgs chosen for pan-eu pipeline fit). DISABLED pending owner ToS decision."

  - name: "World Bank Careers"
    url: "https://www.worldbank.org/ext/en/careers"
    country_code: null
    category: international-orgs
    scraper: ats_auto
    platform: cornerstone
    identifier:
      account: worldbankgroup
      site_id: "1"
    org_static: "World Bank Group"
    enabled: true
    notes: "General board (intern-only filter removed) per owner decision 2026-07-22. Enable-date dry-run: 194 raw / 193 after relevance filter. Cornerstone OnDemand (worldbankgroup.csod.com). JSON API path active; account=worldbankgroup, site_id=1 confirmed."

  - name: "OECD Careers"
    url: "https://www.oecd.org/en/about/careers/internships.html"
    country_code: null
    category: international-orgs
    scraper: ats_auto
    platform: smartrecruiters
    identifier:
      company_id: "OECD"
    org_static: "OECD"
    enabled: true
    notes: "General board (intern-only filter removed) per owner decision 2026-07-22. Enable-date dry-run: 21 raw / 20 after relevance filter. SmartRecruiters company_id=OECD confirmed 2026-07-22."

  - name: "WTO Careers"
    url: "https://www.wto.org/english/thewto_e/vacan_e/"
    country_code: null
    category: international-orgs
    scraper: ats_auto
    platform: workday
    identifier:
      tenant: wto
      dc: wd103
      site: External
    org_static: "World Trade Organization"
    enabled: true
    notes: "General board (intern-only filter removed) per owner decision 2026-07-22. Enable-date dry-run: 7 raw / 6 after relevance filter. Workday wd103. Identifier confirmed 2026-07-22."
