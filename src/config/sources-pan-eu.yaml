# Pol-Intel EU National Sources — Pan-European Backbone
# These sources are not country-specific; country_code is null.
# The runtime location parser assigns geo-tags per job from description/title.
# Highest ROI sources: enable Stage 1 first.
#
# NOTE: EuroBrussels already exists in sources-brussels.yaml as a dedicated scraper
# (enabled: true). Do NOT duplicate it here.

sources:

  # ── Pan-EU job boards (Stage 1 — KEEP) ───────────────────────────────────

  - name: "EURACTIV JobSite"
    url: "https://jobs.euractiv.com/"
    country_code: null
    category: eu-affairs
    scraper: ats_auto
    language: en
    enabled: false
    notes: "KEEP. ~100% relevant. DEFERRED: WP Job Manager site, no valid jobs RSS or API. /rss/ and /feed/ return career-advice articles only (same issue as disabled 'EurActiv Jobs' entry in sources-brussels.yaml). Needs a selector scraper once DOM structure is confirmed, or AI on rendered HTML. Do not duplicate the sources-brussels.yaml entry."

  - name: "EUJobs.co"
    url: "https://www.eujobs.co/"
    country_code: null
    category: eu-affairs
    scraper: ats_auto
    render_js: true
    language: en
    enabled: false
    notes: "KEEP. ~100% relevant. DEFERRED to Playwright tier — JS-rendered React app with no SSR job content. Selector extraction once rendered."

  # ── Development/international (CONDITIONAL — Stage 3) ────────────────────

  - name: "UN Job Feed"
    url: "https://careers.un.org/jobfeed"
    country_code: null
    category: international-orgs
    scraper: rss_feed
    field_map:
      title: title
      description: description
    org_from_description_regex: "Department/Office\\s*:\\s*([^\\n]+?)(?:\\s+Duty Station|\\s*$)"
    enrich_description: false  # RSS is a metadata-header stub only (Level/Job ID/Duty Station/dates). The full body is on the JS-rendered Inspira detail page and is deliberately not fetched; the stub is accepted for discovery. Restored 2026-07-13; org/location/closing are recovered downstream by fetch-rss's UN parser.
    enabled: true

  - name: "Devex"
    url: "https://www.devex.com/jobs/search"
    country_code: null
    category: international-orgs
    scraper: ats_auto
    language: en
    enabled: false
    notes: "AI-only extraction — deactivated under zero-API policy; revisit via per-site selector or deliberate AI re-enable. COND. Global development; ~70% relevant after filtering for EU/policy. JS-rendered - may need Playwright or partner feed. Enable only after relevance filter confirmed."

  # CATEGORISATION NOTE: OSF is a private philanthropic foundation, not an intergovernmental
  # organisation. pan-eu has no dedicated foundations feed; this entry is placed here as the
  # least-bad fit given current feed taxonomy. Owner should consider re-routing to a foundations
  # feed if one is created, or splitting international-orgs into a broader international category.
  - name: "Open Society Foundations Careers"
    url: "https://osfglobal.wd5.myworkdayjobs.com/OSF"
    country_code: null
    category: international-orgs
    scraper: ats_auto
    platform: workday
    identifier:
      tenant: osfglobal
      dc: wd5
      site: OSF
    org_static: "Open Society Foundations"
    require_internship_signal: true
    enabled: false  # GATED: new entry 2026-07-22. Workday portal confirmed live. OSF main site ToS (opensocietyfoundations.org/policies/terms-and-conditions) explicitly prohibits scraping; actual target is osfglobal.wd5.myworkdayjobs.com which robots.txt explicitly allows /OSF/. Owner cost decision and flag flip required before enabling.
    notes: "Workday wd5. Identifier confirmed 2026-07-22: tenant=osfglobal, dc=wd5, site=OSF (osfglobal.wd5.myworkdayjobs.com/OSF returns HTTP 200). OSF main site ToS explicitly prohibits automated scraping; however the scraping target is the Workday-hosted portal (different domain, governed by Workday ToS) which explicitly allows /OSF/ in robots.txt. Flag for owner review. Positive signal filter applied — OSF posts a mix of grant, programme and operational roles."
