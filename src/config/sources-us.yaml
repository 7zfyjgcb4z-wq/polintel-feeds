# Pol-Intel US Sources Configuration
# scraper: "dedicated" = Tier 1 hand-written scraper
#          "selector"  = Tier 2 CSS-selector scraper (zero-API)
#          "rss_feed"  = Tier 2 RSS/Atom feed scraper (zero-API)
#          "ats_auto"  = Tier 2 ATS auto-detection (greenhouse/lever/teamtailor/applied only)
# Note: scraper: "generic" is deprecated in pipeline.py — not used here.
# Note: uses "module" key (not "scraper_module") to match pipeline.py
# partisan_lean values: left, centre-left, centre, centre-right, right, nonpartisan, unknown

sources:

  # ── Tier 1: Dedicated scrapers ─────────────────────────────────────────────

  - name: "USAJobs Fellowships"
    url: "https://data.usajobs.gov/api/Search"
    country: us
    category: us-fellowships
    scraper: dedicated
    module: usajobs
    language: en
    partisan_lean: nonpartisan
    enabled: true
    keyword_queries:
      - "presidential management fellow"
      - "policy fellowship"
      - "congressional fellowship"
      - "government fellowship"
      - "pathways intern"
    total_cap: 200
    notes: "Uses USAJobs Keyword API parameter (not JobCategoryCode) to find fellowship programs: PMF, policy fellowships, congressional fellowships, Pathways internships. Keyword mode bypasses the standard relevance post-filter since the query term is itself the signal. Runs before the main USAJobs source so that fellowship jobs are categorised us-fellowships if the same job_id appears in both queries. Requires USAJOBS_API_KEY and USAJOBS_USER_AGENT."

  - name: "USAJobs"
    url: "https://data.usajobs.gov/api/Search"
    country: us
    category: us-federal
    scraper: dedicated
    module: usajobs
    schedule: "*/12"
    language: en
    partisan_lean: nonpartisan
    enabled: true
    notes: "Official federal government REST API. Free developer key from developer.usajobs.gov. Hybrid filter: query by series codes (0110, 0130, 0131, 0301, 0340, 0343, 1035), keyword post-filter, hard cap 500 per run. Requires env vars USAJOBS_USER_AGENT and USAJOBS_API_KEY."

  - name: "House Employment Bulletin"
    url: "https://www.house.gov/employment/positions-with-members-and-committees"
    country: us
    category: us-congress
    scraper: dedicated
    module: house_employment_bulletin
    schedule: "daily"
    language: en
    partisan_lean: unknown
    enabled: true
    enrich_description: false
    notes: "Official House HVAPS bulletin, consumed via Derek Willis's open-source project (https://github.com/dwillis/house-jobs, MIT License). Willis ingests each weekly PDF bulletin, parses it with Gemini, and commits structured JSON to the repo. Scraper fetches the 4 most recent JSON files (~1 month) via GitHub raw CDN — no PDF parsing, no HTML scraping. Job IDs are MEM-NNN-YY format; URL uses a fragment anchor for uniqueness since HVAPS listings have no individual pages. Staleness alert fires in alerts.json if the upstream has not been updated in >14 days (two missed weekly cycles). GITHUB_TOKEN env var enables authenticated API calls (5000 req/hr vs 60/hr); optional since we make <5 calls per run. Senate equivalent does not exist — Senate Employment Office HTML is 403-blocked and no maintained scraper project was found."

  - name: "Tom Manatos Jobs"
    url: "https://www.tommanatosjobs.com"
    country: us
    category: us-congress
    scraper: dedicated
    module: tom_manatos
    schedule: "daily"
    language: en
    partisan_lean: unknown
    enabled: false
    notes: "Leading Capitol Hill job board. BLOCKED: Cloudflare challenge in both local (HTTP 403) and CI (HTTP 200 + JS challenge page → 0 jobs scraped). Browser headers alone are insufficient. Needs Playwright + Cloudflare solver (e.g. unblock-origin) to work reliably. Re-enable when browser automation is added to the pipeline."

  - name: "Idealist"
    url: "https://www.idealist.org/en/jobs?searchMode=ALL&q=&locationType=REMOTE,ONSITE,HYBRID&country=US&categories=POLICY_AND_ADVOCACY,GOVERNMENT_RELATIONS"
    country: us
    category: us-ngos
    scraper: dedicated
    module: idealist
    schedule: "daily"
    language: en
    partisan_lean: nonpartisan
    enabled: false
    notes: "Major nonprofit and NGO aggregator. Confirmed live (200). JS-rendered listings — Playwright required. Filter by US location and policy/advocacy/government-relations categories at query time. Apply post-filter to exclude direct-service roles. Disabled 2026-07-03: pipeline has no Playwright, so this returned 0 jobs every run behind a misleading green tick."

  - name: "Political Job Hunt"
    url: "https://www.politicaljobhunt.com"
    country: us
    category: us-campaigns
    scraper: dedicated
    module: political_job_hunt
    schedule: "daily"
    language: en
    partisan_lean: unknown
    enabled: true
    notes: "Political Wire's job board (Jobboardly SPA platform). Job listings are JS-rendered — scraper uses XML sitemap to discover all active URLs and derives titles from slugs. Individual job pages contain static JSON-LD and og-tags that the readability enricher successfully extracts (~2 min overhead per run across 200 jobs)."

  - name: "LobbyingJobs.com"
    url: "https://lobbyingjobs.com"
    country: us
    category: us-government-affairs
    scraper: dedicated
    module: lobbyingjobs
    schedule: "daily"
    language: en
    partisan_lean: unknown
    enabled: false
    notes: "Dedicated board for lobbying, government relations, advocacy, public policy. Selectors rewritten for new Tailwind markup (a04179b), verified 20/20 against a local fixture. DISABLED: CI returns 403 (local IP 200, datacenter IP blocked); no evasion. Re-enable = flip enabled: true after a CI-context 200 re-test."

