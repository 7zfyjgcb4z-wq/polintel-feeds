name: Scrape UK Sources

on:
  schedule:
    - cron: "0 6 * * *"      # Daily at 06:00 UTC
  workflow_dispatch:           # Manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtual environment
        run: python3.11 -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          source .venv/bin/activate
          playwright install chromium --with-deps

      - name: Run scrapers
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          source .venv/bin/activate
          python3 -m src.cli run --country uk

      - name: Commit results
        run: |
          git config user.name "Pol-Intel Bot"
          git config user.email "bot@orison.co"
          git add data/jobs.db feeds/
          git diff --staged --quiet || git commit -m "Update UK feeds [skip ci]"
          git push
