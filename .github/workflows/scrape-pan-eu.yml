name: Scrape Pan-EU Sources

on:
  schedule:
    - cron: "0 10 * * *"   # 10:00 UTC daily — after EU national (09:30) finishes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-pan-eu
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Install Playwright if needed
        run: |
          if grep -q "requires_js: true" src/config/sources-pan-eu.yaml 2>/dev/null; then
            playwright install chromium
          else
            echo "No JS sources, skipping Playwright"
          fi

      - name: Run Pan-EU scrapers
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.cli run --country pan-eu
        timeout-minutes: 20

      - name: Commit results
        run: |
          git config user.name "Pol-Intel Bot"
          git config user.email "bot@orison.co"
          git pull --rebase origin HEAD
          git add data/jobs.db feeds/
          git diff --staged --quiet || git commit -m "Update pan-EU feeds [skip ci]"
          git push
